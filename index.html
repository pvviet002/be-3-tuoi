            -webkit-touch-callout: none;

        /* Hiệu ứng rung lắc khi bé chọn sai */
        @keyframes shake {
            10%, 90% { transform: translate3d(-2px, 0, 0); }
            20%, 80% { transform: translate3d(4px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-8px, 0, 0); }
            40%, 60% { transform: translate3d(8px, 0, 0); }
        }
        
        /* Hiệu ứng xoay chậm cho ngôi sao chiến thắng */
        @keyframes spin-slow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .animate-spin-slow {
            animation: spin-slow 8s linear infinite;
        }

        .animate-shake {
            animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
        }

        // ==========================================
        // COMPONENT TRÒ CHƠI CHUNG
        // ==========================================
        const LessonGame = ({ lessonInfo, onBack, audioRef }) => {
            const [gameState, setGameState] = useState('START'); // START, PLAYING, END
            const [targetItem, setTargetItem] = useState(null);
            const [options, setOptions] = useState([]);
            const [score, setScore] = useState(0);
            const [wrongClickedId, setWrongClickedId] = useState(null);
            const [showSuccess, setShowSuccess] = useState(false);

            // Sử dụng useRef để lưu trữ các ID của đồ vật đã được hỏi trong suốt lượt chơi này
            const usedItemsRef = useRef([]);

            // Hàm đọc Text-to-Speech
            const speak = useCallback((text, rate = 0.8) => {
                if ('speechSynthesis' in window) {
                    window.speechSynthesis.cancel();
                    const utterance = new SpeechSynthesisUtterance(text);
                    const voices = window.speechSynthesis.getVoices();
                    const viVoice = voices.find(v => v.lang.includes('vi') || v.lang.includes('VN'));
                    if (viVoice) utterance.voice = viVoice;
                    
                    utterance.lang = 'vi-VN';
                    utterance.rate = rate;
                    utterance.pitch = 1.2;

                    // Hạ âm lượng nhạc nền khi đọc để bé nghe rõ (Audio Ducking)
                    utterance.onstart = () => {
                        if (audioRef && audioRef.current) audioRef.current.volume = 0.02;
                    };
                    // Khôi phục âm lượng khi đọc xong
                    utterance.onend = () => {
                        if (audioRef && audioRef.current) audioRef.current.volume = 0.15;
                    };
                    utterance.onerror = () => {
                        if (audioRef && audioRef.current) audioRef.current.volume = 0.15;
                    };

                    window.speechSynthesis.speak(utterance);
                }
            }, [audioRef]);

            const generateQuestion = useCallback(() => {
                const items = lessonInfo.items;
                
                // 1. Lọc ra danh sách các đồ vật chưa từng được hỏi
                let availableItems = items.filter(item => !usedItemsRef.current.includes(item.id));
                
                // 2. Nếu đã hỏi hết tất cả các đồ vật, tự động reset lại lịch sử
                if (availableItems.length === 0) {
                    usedItemsRef.current = [];
                    availableItems = items;
                }

                // 3. Bốc ngẫu nhiên 1 đồ vật từ danh sách chưa hỏi
                const randomTargetIndex = Math.floor(Math.random() * availableItems.length);
                const target = availableItems[randomTargetIndex];

                // 4. Lưu ID vừa chọn vào lịch sử
                usedItemsRef.current.push(target.id);

                // 5. Chọn 1 đồ vật nhiễu (sai) ngẫu nhiên (có thể là đồ vật cũ để gây nhiễu)
                let wrongIndex = Math.floor(Math.random() * items.length);
                while (items[wrongIndex].id === target.id) {
                    wrongIndex = Math.floor(Math.random() * items.length);
                }
                const wrong = items[wrongIndex];

                // 6. Trộn vị trí hiển thị
                const newOptions = Math.random() > 0.5 ? [target, wrong] : [wrong, target];
                
                setTargetItem(target);
                setOptions(newOptions);
                setWrongClickedId(null);
                setShowSuccess(false);

                setTimeout(() => {
                    speak(`Bé ơi, ${target.name} ở đâu nhỉ?`);
                }, 500);
            }, [speak, lessonInfo]);

            const startGame = () => {
                speak(`Chào mừng bé đến với bài học: ${lessonInfo.title}!`);
                setScore(0);
                usedItemsRef.current = []; // Xóa toàn bộ lịch sử khi bắt đầu một lượt chơi mới
                setGameState('PLAYING');
                setTimeout(generateQuestion, 3000);
            };

            const handleItemClick = (item) => {
                if (showSuccess) return;

                if (item.id === targetItem.id) {
                    setShowSuccess(true);
                    setScore(s => s + 1);
                    
                    const praises = ["Bé giỏi quá!", "Tuyệt vời!", "Đúng rồi!", "Hoan hô bé!"];
                    const randomPraise = praises[Math.floor(Math.random() * praises.length)];
                    speak(`${randomPraise} Đây là ${targetItem.name}.`);

                    setTimeout(() => {
                        if (score + 1 >= 5) {
                            setGameState('END');
                            speak("Chúc mừng bé đã hoàn thành bài học xuất sắc! Bé được thưởng 5 ngôi sao luôn!");
                        } else {
                            generateQuestion();
                        }
                    }, 3000);

                } else {
                    setWrongClickedId(item.id);
                    speak(`Chưa đúng rồi. Đây là ${item.name}. Bé tìm lại ${targetItem.name} nhé!`);
                    setTimeout(() => setWrongClickedId(null), 1000);
                }
            };

            const repeatQuestion = () => {
                if (targetItem) {
                    speak(`Bé tìm giúp cô, ${targetItem.name} ở đâu nhỉ?`);
                }
            };

            if (gameState === 'START') {
                return (
                    <div className="min-h-screen bg-indigo-50 flex flex-col items-center justify-center p-4 font-sans relative">
                        <button onClick={onBack} className="absolute top-6 left-6 flex items-center gap-2 bg-white text-indigo-500 hover:bg-indigo-100 px-4 py-2 rounded-xl shadow-md font-bold transition-transform active:scale-90">
                            <IconArrowLeft size={24} /> Quay lại
                        </button>
                        <div className={`bg-white p-8 rounded-3xl shadow-xl text-center max-w-md w-full border-4 ${lessonInfo.color.replace('bg-', 'border-')} transform transition hover:scale-105`}>
                            <div className="text-6xl mb-4">{lessonInfo.icon}</div>
                            <h1 className={`text-4xl font-bold mb-8 font-sans ${lessonInfo.color.replace('bg-', 'text-').replace('-400', '-600')}`}>
                                {lessonInfo.title}
                            </h1>
                            <button 
                                onClick={startGame}
                                className={`w-full ${lessonInfo.color} hover:opacity-90 text-white text-3xl font-bold py-6 px-8 rounded-2xl shadow-lg flex items-center justify-center gap-4 transition-transform active:scale-95`}
                            >
                                <IconPlay size={40} fill="currentColor" /> Bắt đầu học
                            </button>
                        </div>
                    </div>
                );
            }

            if (gameState === 'END') {
                return (
                    <div className="min-h-screen bg-yellow-100 flex flex-col items-center justify-center p-4 font-sans">
                        <div className="bg-white p-8 rounded-3xl shadow-xl text-center max-w-md w-full border-4 border-yellow-400">
                            <h1 className="text-4xl font-bold text-yellow-500 mb-4">Bé Giỏi Quá!</h1>
                            <div className="flex justify-center gap-2 mb-8">
                                {[1, 2, 3, 4, 5].map(i => (
                                    <IconStar key={i} size={48} className="text-yellow-400 animate-spin-slow" fill="currentColor" />
                                ))}
                            </div>
                            <p className="text-2xl text-gray-700 mb-8">Bé đã hoàn thành xuất sắc!</p>
                            <div className="flex flex-col gap-4">
                                <button 
                                    onClick={startGame}
                                    className="w-full bg-sky-500 hover:bg-sky-600 text-white text-2xl font-bold py-4 rounded-2xl shadow flex items-center justify-center gap-2 active:scale-95"
                                >
                                    <IconRefresh size={28} /> Chơi lại bài này
                                </button>
                                <button 
                                    onClick={onBack}
                                    className="w-full bg-gray-200 hover:bg-gray-300 text-gray-700 text-2xl font-bold py-4 rounded-2xl shadow flex items-center justify-center gap-2 active:scale-95"
                                >
                                    <IconHome size={28} /> Về màn hình chính
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-slate-50 flex flex-col items-center justify-between p-6 font-sans">
                    <div className="w-full max-w-2xl flex justify-between items-center bg-white p-4 rounded-2xl shadow-md border-2 border-slate-200">
                        <button onClick={onBack} className="text-slate-400 hover:text-red-500 bg-slate-100 p-2 rounded-full active:scale-90 transition">
                            <IconArrowLeft size={28} />
                        </button>
                        <div className="flex gap-1 flex-1 justify-center">
                            {[...Array(5)].map((_, i) => (
                                <IconStar key={i} size={32} className={i < score ? "text-yellow-400 transform scale-110" : "text-gray-200"} fill={i < score ? "currentColor" : "none"} />
                            ))}
                        </div>
                        <button onClick={repeatQuestion} className="bg-blue-100 hover:bg-blue-200 text-blue-600 p-3 rounded-full active:scale-90 transition">
                            <IconVolume2 size={32} />
                        </button>
                    </div>

                    <div className="flex-1 w-full max-w-2xl flex flex-col items-center justify-center gap-8 my-8">
                        <h2 className={`text-4xl md:text-5xl font-bold text-center drop-shadow-sm ${lessonInfo.color.replace('bg-', 'text-').replace('-400', '-600')}`}>
                            {targetItem && `Bé tìm: ${targetItem.name.toUpperCase()}`}
                        </h2>

                        <div className="flex flex-col sm:flex-row gap-6 w-full px-4 justify-center">
                            {options.map((item) => {
                                const isWrong = wrongClickedId === item.id;
                                const isCorrectTarget = showSuccess && item.id === targetItem?.id;
                                
                                return (
                                    <button
                                        key={item.id}
                                        onClick={() => handleItemClick(item)}
                                        className={`
                                            flex-1 aspect-square max-w-[320px] mx-auto flex items-center justify-center transition-all duration-300 bg-transparent rounded-full
                                            ${isWrong ? 'animate-shake opacity-75' : 'hover:scale-110'}
                                            ${isCorrectTarget ? 'scale-125' : ''}
                                            ${showSuccess && !isCorrectTarget ? 'opacity-20 scale-75' : ''}
                                            active:scale-95 text-slate-800
                                        `}
                                    >
                                        <span className={lessonInfo.id === 'chu_cai' || lessonInfo.id === 'chu_so' ? "text-[140px] sm:text-[180px] md:text-[220px] font-black drop-shadow-xl" : "text-[140px] sm:text-[180px] md:text-[220px] drop-shadow-2xl"}>
                                            {item.emoji}
                                        </span>
                                    </button>
                                );
                            })}
                        </div>
                    </div>

                    {showSuccess && (
                        <div className="absolute inset-0 pointer-events-none flex items-center justify-center z-50">
                             <div className="text-6xl animate-bounce">🎉 🎈 🎉</div>
                        </div>
                    )}
                </div>
            );
        };

        // ==========================================
        // COMPONENT CHÍNH (MENU MỤC LỤC)
        // ==========================================
        const App = () => {
            const [selectedLessonId, setSelectedLessonId] = useState(null);
            const [ttsWarning, setTtsWarning] = useState('');
            const [isMusicPlaying, setIsMusicPlaying] = useState(false);
            const audioRef = useRef(null);

            useEffect(() => {
                // Khởi tạo nhạc nền (Sử dụng một bản nhạc royalty-free cho thiếu nhi)
                const audio = new Audio('https://cdn.pixabay.com/audio/2022/03/10/audio_78f18fa1dd.mp3');
                audio.loop = true;
                audio.volume = 0.15; // Mặc định âm lượng rất nhỏ để không lấn át giọng đọc
                audioRef.current = audio;

                return () => {
                    audio.pause();
                    audio.src = '';
                };
            }, []);

            const toggleMusic = () => {
                if (!audioRef.current) return;
                if (isMusicPlaying) {
                    audioRef.current.pause();
                    setIsMusicPlaying(false);
                } else {
                    audioRef.current.play().then(() => {
                        setIsMusicPlaying(true);
                    }).catch(e => console.log("Lỗi phát nhạc:", e));
                }
            };

            useEffect(() => {
                const checkVoices = () => {
                    const voices = window.speechSynthesis.getVoices();
                    if (voices.length > 0) {
                        const hasVietnamese = voices.some(v => v.lang.includes('vi') || v.lang.includes('VN'));
                        if (!hasVietnamese) {
                            setTtsWarning('Máy của bạn chưa cài Giọng đọc tiếng Việt. Vui lòng mở bằng Google Chrome hoặc tải giọng tiếng Việt trong Cài đặt hệ thống.');
                        } else {
                            setTtsWarning('');
                        }
                    }
                };
                checkVoices();
                if (window.speechSynthesis.onvoiceschanged !== undefined) {
                    window.speechSynthesis.onvoiceschanged = checkVoices;
                }
            }, []);

            if (selectedLessonId) {
                const lessonInfo = LESSONS_DATA[selectedLessonId];
                return (
                    <>
                        <button onClick={toggleMusic} className="fixed top-4 right-4 z-50 bg-white/80 backdrop-blur p-3 rounded-full shadow-lg text-sky-500 hover:bg-sky-100 transition-transform active:scale-90">
                            {isMusicPlaying ? <IconMusic size={28} /> : <IconMusicOff size={28} className="text-gray-400" />}
                        </button>
                        <LessonGame 
                            lessonInfo={lessonInfo} 
                            onBack={() => {
                                window.speechSynthesis.cancel();
                                setSelectedLessonId(null);
                            }} 
                            audioRef={audioRef} 
                        />
                    </>
                );
            }

            return (
                <div className="min-h-screen bg-sky-50 flex flex-col items-center py-10 px-4 font-sans relative">
                    <button onClick={toggleMusic} className="absolute top-4 right-4 z-50 bg-white/80 backdrop-blur p-3 rounded-full shadow-lg text-sky-500 hover:bg-sky-100 transition-transform active:scale-90">
                        {isMusicPlaying ? <IconMusic size={28} /> : <IconMusicOff size={28} className="text-gray-400" />}
                    </button>

                    {ttsWarning && (
                        <div className="w-full max-w-3xl bg-yellow-100 border-l-4 border-yellow-500 text-yellow-800 p-4 mb-6 rounded shadow-md text-sm md:text-base">
                            <p><strong>Lưu ý:</strong> {ttsWarning}</p>
                        </div>
                    )}

                    <div className="text-center mb-10">
                        <h1 className="text-5xl md:text-6xl font-bold text-sky-600 mb-4 drop-shadow-sm flex items-center justify-center gap-4">
                            <IconStar className="text-yellow-400" size={48} fill="currentColor"/> 
                            Bé Vui Học 
                            <IconStar className="text-yellow-400" size={48} fill="currentColor"/>
                        </h1>
                        <p className="text-xl text-gray-500 font-medium">Bé hãy chọn một bài học bên dưới nhé!</p>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 w-full max-w-7xl">
                        {Object.values(LESSONS_DATA).map((lesson) => (
                            <button
                                key={lesson.id}
                                onClick={() => setSelectedLessonId(lesson.id)}
                                className={`${lesson.color} hover:opacity-90 transition-all duration-300 transform hover:-translate-y-2 hover:shadow-2xl shadow-lg rounded-3xl p-6 flex flex-col items-center justify-center gap-4 text-white group active:scale-95`}
                            >
                                <div className="text-7xl group-hover:scale-110 transition-transform duration-300 drop-shadow-lg">
                                    {lesson.icon}
                                </div>
                                <h2 className="text-2xl font-bold text-center">
                                    {lesson.title}
                                </h2>
                            </button>
                        ))}
                    </div>
                    
                    <div className="mt-12 text-gray-400 text-sm font-medium">
                        Ứng dụng thiết kế đặc biệt cho trẻ mầm non
                    </div>
                </div>
            );
        };

        // Render App vào div#root
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
