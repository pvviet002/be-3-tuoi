<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bé Vui Học - Săn Chữ</title>

    <!-- Import React, ReactDOM, và Babel -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Import Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body {
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Font chữ giống SGK cho phần nhận diện chữ */
        .font-sgk {
            font-family: "Times New Roman", Times, serif;
        }

        @keyframes shake {
            10%, 90% { transform: translate3d(-2px, 0, 0); }
            20%, 80% { transform: translate3d(4px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-8px, 0, 0); }
            40%, 60% { transform: translate3d(8px, 0, 0); }
        }
        
        @keyframes spin-slow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .animate-spin-slow {
            animation: spin-slow 8s linear infinite;
        }

        .animate-shake {
            animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
        }

        /* Hiệu ứng vẽ vòng tròn khoanh đỏ */
        .circled {
            border: 4px solid #ef4444; /* red-500 */
            border-radius: 50%;
            color: #ef4444;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useRef } = React;

        // ==========================================
        // CÁC COMPONENT ICON
        // ==========================================
        const IconPlay = ({ size=24, className="", fill="none" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
        );
        const IconVolume2 = ({ size=24, className="" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path><path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path></svg>
        );
        const IconStar = ({ size=24, className="", fill="none" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>
        );
        const IconRefresh = ({ size=24, className="" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="1 4 1 10 7 10"></polyline><polyline points="23 20 23 14 17 14"></polyline><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"></path></svg>
        );
        const IconHome = ({ size=24, className="" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
        );
        const IconArrowLeft = ({ size=24, className="" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        );

        // ==========================================
        // DỮ LIỆU BẢNG CHỮ CÁI
        // ==========================================
        const ALPHABET = [
            { lower: 'a', upper: 'A', name: 'chữ a' }, { lower: 'ă', upper: 'Ă', name: 'chữ á' }, { lower: 'â', upper: 'Â', name: 'chữ ớ' },
            { lower: 'b', upper: 'B', name: 'chữ bờ' }, { lower: 'c', upper: 'C', name: 'chữ cờ' }, { lower: 'd', upper: 'D', name: 'chữ dờ' },
            { lower: 'đ', upper: 'Đ', name: 'chữ đờ' }, { lower: 'e', upper: 'E', name: 'chữ e' }, { lower: 'ê', upper: 'Ê', name: 'chữ ê' },
            { lower: 'g', upper: 'G', name: 'chữ gờ' }, { lower: 'h', upper: 'H', name: 'chữ hờ' }, { lower: 'i', upper: 'I', name: 'chữ i ngắn' },
            { lower: 'k', upper: 'K', name: 'chữ ca' }, { lower: 'l', upper: 'L', name: 'chữ lờ' }, { lower: 'm', upper: 'M', name: 'chữ mờ' },
            { lower: 'n', upper: 'N', name: 'chữ nờ' }, { lower: 'o', upper: 'O', name: 'chữ o' }, { lower: 'ô', upper: 'Ô', name: 'chữ ô' },
            { lower: 'ơ', upper: 'Ơ', name: 'chữ ơ' }, { lower: 'p', upper: 'P', name: 'chữ pờ' }, { lower: 'q', upper: 'Q', name: 'chữ cu' },
            { lower: 'r', upper: 'R', name: 'chữ rờ' }, { lower: 's', upper: 'S', name: 'chữ sờ' }, { lower: 't', upper: 'T', name: 'chữ tờ' },
            { lower: 'u', upper: 'U', name: 'chữ u' }, { lower: 'ư', upper: 'Ư', name: 'chữ ư' }, { lower: 'v', upper: 'V', name: 'chữ vờ' },
            { lower: 'x', upper: 'X', name: 'chữ xờ' }, { lower: 'y', upper: 'Y', name: 'chữ y dài' }
        ];

        // ==========================================
        // COMPONENT CHÍNH
        // ==========================================
        const App = () => {
            const [gameState, setGameState] = useState('START'); // START, PLAYING, END
            const [targetLetter, setTargetLetter] = useState(null);
            const [boardLetters, setBoardLetters] = useState([]);
            const [foundCount, setFoundCount] = useState(0);
            const [totalTargets, setTotalTargets] = useState(0);
            const [wrongClickedId, setWrongClickedId] = useState(null);
            const [starCount, setStarCount] = useState(0);

            const activeTimeoutsRef = useRef([]);
            const recentTargetsRef = useRef([]); // Chống lặp đề bài

            useEffect(() => {
                return () => {
                    activeTimeoutsRef.current.forEach(clearTimeout);
                    window.speechSynthesis.cancel();
                };
            }, []);

            const setSafeTimeout = (callback, delay) => {
                const timer = setTimeout(callback, delay);
                activeTimeoutsRef.current.push(timer);
                return timer;
            };

            const speak = useCallback((text, rate = 0.85, onEndCallback = null) => {
                if ('speechSynthesis' in window) {
                    window.speechSynthesis.cancel();
                    const utterance = new SpeechSynthesisUtterance(text);
                    const voices = window.speechSynthesis.getVoices();
                    
                    const bestVoice = voices.find(v => (v.lang.includes('vi') || v.lang.includes('VN')) && (v.name.includes('Neural') || v.name.includes('HoaiMy')))
                                   || voices.find(v => (v.lang.includes('vi') || v.lang.includes('VN')) && v.name.includes('Google'))
                                   || voices.find(v => v.lang.includes('vi') || v.lang.includes('VN'));
                                   
                    if (bestVoice) utterance.voice = bestVoice;
                    
                    utterance.lang = 'vi-VN';
                    utterance.rate = rate; 
                    utterance.pitch = 1.1; 

                    if (onEndCallback) {
                        let isEnded = false;
                        const handleEnd = () => {
                            if (!isEnded) {
                                isEnded = true;
                                onEndCallback();
                            }
                        };
                        utterance.onend = handleEnd;
                        utterance.onerror = handleEnd;
                        setSafeTimeout(handleEnd, text.length * 150 + 1500); 
                    }
                    window.speechSynthesis.speak(utterance);
                } else {
                    if (onEndCallback) setSafeTimeout(onEndCallback, 2000);
                }
            }, []);

            const generateBoard = useCallback(() => {
                // 1. Chọn chữ mục tiêu không bị lặp
                let availableTargets = ALPHABET.filter(item => !recentTargetsRef.current.includes(item.lower));
                if (availableTargets.length === 0) {
                    recentTargetsRef.current = [];
                    availableTargets = ALPHABET;
                }
                const target = availableTargets[Math.floor(Math.random() * availableTargets.length)];
                recentTargetsRef.current.push(target.lower);
                if (recentTargetsRef.current.length > 5) recentTargetsRef.current.shift();

                setTargetLetter(target);

                // 2. Cấu hình bảng
                const BOARD_SIZE = 20; // Tổng số chữ trên màn hình
                const TARGET_AMOUNT = 6; // Tổng số chữ mục tiêu bé cần tìm (3 hoa, 3 thường)
                setTotalTargets(TARGET_AMOUNT);
                setFoundCount(0);

                let newBoard = [];
                
                // Thêm các chữ mục tiêu (Hoa và Thường)
                for (let i = 0; i < TARGET_AMOUNT; i++) {
                    newBoard.push({
                        id: `target_${i}`,
                        char: i % 2 === 0 ? target.upper : target.lower,
                        isTarget: true,
                        isFound: false,
                        // Tạo hiệu ứng xô lệch rải rác ngẫu nhiên
                        rot: Math.floor(Math.random() * 40) - 20, // -20deg đến 20deg
                        tx: Math.floor(Math.random() * 20) - 10,  // -10px đến 10px
                        ty: Math.floor(Math.random() * 20) - 10
                    });
                }

                // Lọc các chữ nhiễu (không trùng với mục tiêu)
                const distractors = ALPHABET.filter(item => item.lower !== target.lower);
                
                // Thêm chữ nhiễu cho đủ 20 vị trí
                for (let i = 0; i < (BOARD_SIZE - TARGET_AMOUNT); i++) {
                    const randomDistractor = distractors[Math.floor(Math.random() * distractors.length)];
                    newBoard.push({
                        id: `distractor_${i}`,
                        char: Math.random() > 0.5 ? randomDistractor.upper : randomDistractor.lower,
                        isTarget: false,
                        isFound: false,
                        rot: Math.floor(Math.random() * 40) - 20,
                        tx: Math.floor(Math.random() * 20) - 10,
                        ty: Math.floor(Math.random() * 20) - 10
                    });
                }

                // Trộn ngẫu nhiên mảng
                newBoard.sort(() => Math.random() - 0.5);
                setBoardLetters(newBoard);

                // Đọc đề bài
                setSafeTimeout(() => {
                    speak(`Cô đố con tìm và khoanh tròn tất cả các ${target.name} nhé!`);
                }, 500);

            }, [speak]);

            const handleStartApp = () => {
                // Mồi audio
                const applause = document.getElementById('applauseSound');
                if (applause) {
                    applause.play().then(() => {
                        applause.pause();
                        applause.currentTime = 0;
                    }).catch(e => console.log("Lỗi mồi audio:", e));
                }
                setStarCount(0);
                speak(`Cô chào con! Chúng mình cùng chơi trò Săn chữ nhé!`, 0.85, () => {
                    setGameState('PLAYING');
                    generateBoard();
                });
            };

            const handleLetterClick = (letterObj) => {
                if (letterObj.isFound) return; // Bỏ qua nếu đã khoanh rồi

                if (letterObj.isTarget) {
                    // Cập nhật state khoanh tròn
                    setBoardLetters(prev => prev.map(l => l.id === letterObj.id ? { ...l, isFound: true } : l));
                    
                    const newFoundCount = foundCount + 1;
                    setFoundCount(newFoundCount);

                    // Hiệu ứng âm thanh khi khoanh đúng
                    const ping = document.getElementById('pingSound');
                    if (ping) {
                        ping.currentTime = 0;
                        ping.play().catch(e=>console.log(e));
                    }

                    // Nếu tìm đủ tất cả các chữ mục tiêu
                    if (newFoundCount >= totalTargets) {
                        const applause = document.getElementById('applauseSound');
                        if (applause) {
                            applause.currentTime = 0;
                            applause.play().catch(e => console.log(e));
                        }

                        setStarCount(s => s + 1);
                        speak(`Hoan hô! Con đã tìm được tất cả các ${targetLetter.name} rồi!`, 0.85, () => {
                            setSafeTimeout(() => {
                                if (starCount + 1 >= 5) {
                                    setGameState('END');
                                    speak("Cô chúc mừng con đã hoàn thành xuất sắc! Cô thưởng cho con 5 ngôi sao nhé!");
                                } else {
                                    generateBoard(); // Qua vòng mới
                                }
                            }, 1500);
                        });
                    }

                } else {
                    // Bấm sai
                    setWrongClickedId(letterObj.id);
                    speak(`Chưa đúng rồi con ạ, đây không phải là ${targetLetter.name}.`);
                    setSafeTimeout(() => setWrongClickedId(null), 800);
                }
            };

            const repeatQuestion = () => {
                speak(`Con hãy tìm và khoanh tròn tất cả các ${targetLetter.name} nhé!`);
            };

            // ========================================
            // GIAO DIỆN START
            // ========================================
            if (gameState === 'START') {
                return (
                    <div className="min-h-screen bg-indigo-50 flex flex-col items-center justify-center p-4 font-sans relative">
                        {/* Audio ẩn */}
                        <audio id="applauseSound" src="https://cdn.pixabay.com/audio/2022/03/15/audio_1067517c5b.mp3" preload="auto"></audio>
                        <audio id="pingSound" src="https://cdn.pixabay.com/audio/2021/08/04/audio_0625c1539c.mp3" preload="auto"></audio>

                        <button onClick={() => window.location.href='index.html'} className="absolute top-6 left-6 flex items-center gap-2 bg-white text-indigo-500 hover:bg-indigo-100 px-4 py-2 rounded-xl shadow-md font-bold transition-transform active:scale-90 z-20">
                            <IconArrowLeft size={24} /> Về Menu
                        </button>
                        
                        <div className="bg-white p-8 rounded-3xl shadow-xl text-center max-w-md w-full border-4 border-blue-400 transform transition hover:scale-105">
                            <div className="text-7xl mb-4 relative">
                                🐝<span className="absolute -top-2 -right-4 text-4xl">🔍</span>
                            </div>
                            <h1 className="text-5xl font-bold mb-4 font-sans text-blue-600 tracking-wide">
                                SĂN CHỮ
                            </h1>
                            <p className="text-lg text-slate-500 mb-8 italic">Bé tìm và khoanh tròn chữ cái</p>
                            <button 
                                onClick={handleStartApp}
                                className="w-full bg-blue-500 hover:bg-blue-600 text-white text-3xl font-bold py-6 px-8 rounded-2xl shadow-lg flex items-center justify-center gap-4 transition-transform active:scale-95"
                            >
                                <IconPlay size={40} fill="currentColor" /> Bắt đầu học
                            </button>
                        </div>
                    </div>
                );
            }

            // ========================================
            // GIAO DIỆN END
            // ========================================
            if (gameState === 'END') {
                return (
                    <div className="min-h-screen bg-yellow-100 flex flex-col items-center justify-center p-4 font-sans">
                        <div className="bg-white p-8 rounded-3xl shadow-xl text-center max-w-md w-full border-4 border-yellow-400">
                            <h1 className="text-4xl font-bold text-yellow-500 mb-4">Con Giỏi Quá!</h1>
                            <div className="flex justify-center gap-2 mb-8">
                                {[1, 2, 3, 4, 5].map(i => (
                                    <IconStar key={i} size={48} className="text-yellow-400 animate-spin-slow" fill="currentColor" />
                                ))}
                            </div>
                            <p className="text-2xl text-gray-700 mb-8">Con đã săn được rất nhiều chữ!</p>
                            <div className="flex flex-col gap-4">
                                <button onClick={handleStartApp} className="w-full bg-sky-500 hover:bg-sky-600 text-white text-2xl font-bold py-4 rounded-2xl shadow flex items-center justify-center gap-2 active:scale-95">
                                    <IconRefresh size={28} /> Chơi lại bài này
                                </button>
                                <button onClick={() => window.location.href='index.html'} className="w-full bg-gray-200 hover:bg-gray-300 text-gray-700 text-2xl font-bold py-4 rounded-2xl shadow flex items-center justify-center gap-2 active:scale-95">
                                    <IconHome size={28} /> Về màn hình chính
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            // ========================================
            // GIAO DIỆN PLAYING
            // ========================================
            return (
                <div className="min-h-screen bg-amber-50 flex flex-col items-center justify-between p-4 md:p-6 font-sans relative overflow-hidden">
                    
                    {/* Header Controls */}
                    <div className="w-full max-w-4xl flex justify-between items-center bg-white p-4 rounded-2xl shadow-sm border border-amber-200 z-20">
                        <button onClick={() => window.location.href='index.html'} className="text-slate-400 hover:text-red-500 bg-slate-100 p-2 rounded-full active:scale-90 transition">
                            <IconArrowLeft size={28} />
                        </button>
                        
                        <div className="flex gap-1 flex-1 justify-center">
                            {[...Array(5)].map((_, i) => {
                                const activeStars = starCount === 0 ? 0 : ((starCount - 1) % 5) + 1;
                                return <IconStar key={i} size={32} className={i < activeStars ? "text-yellow-400 transform scale-110" : "text-gray-200"} fill={i < activeStars ? "currentColor" : "none"} />
                            })}
                        </div>
                        
                        <button onClick={repeatQuestion} className="bg-blue-100 hover:bg-blue-200 text-blue-600 p-3 rounded-full active:scale-90 transition">
                            <IconVolume2 size={32} />
                        </button>
                    </div>

                    {/* Đề bài giống hình ảnh mẫu */}
                    <div className="w-full max-w-3xl mt-6 flex justify-between items-center z-10 px-4">
                        <div className="flex flex-col">
                            <h2 className="text-4xl md:text-5xl font-bold text-blue-600 tracking-wide uppercase">SĂN CHỮ</h2>
                            <p className="text-lg md:text-xl text-slate-600 italic">Bé tìm và khoanh tròn chữ cái</p>
                        </div>
                        
                        {/* Hiển thị mục tiêu cần tìm thật to */}
                        {targetLetter && (
                            <div className="flex gap-4 items-baseline bg-white px-6 py-2 rounded-2xl shadow-sm border-2 border-yellow-300 font-sgk font-bold text-amber-500">
                                <span className="text-6xl md:text-8xl">{targetLetter.upper}</span>
                                <span className="text-5xl md:text-7xl">{targetLetter.lower}</span>
                            </div>
                        )}
                    </div>

                    {/* Trang trí hoạt hình (chỉ hiển thị trên màn hình lớn chút để không vướng) */}
                    <div className="absolute top-[25%] left-[2%] text-8xl md:text-[150px] opacity-90 hidden sm:block pointer-events-none z-0 transform -rotate-12">🍯</div>
                    <div className="absolute bottom-[5%] right-[2%] text-8xl md:text-[180px] opacity-90 hidden sm:block pointer-events-none z-0">🐻</div>
                    <div className="absolute top-[40%] right-[10%] text-5xl md:text-7xl animate-bounce hidden sm:block pointer-events-none z-0">🐝</div>

                    {/* Khu vực chơi: Bảng chữ cái rải rác */}
                    <div className="flex-1 w-full max-w-4xl flex items-center justify-center my-8 z-10">
                        <div className="grid grid-cols-4 sm:grid-cols-5 gap-4 md:gap-8 w-full p-4">
                            {boardLetters.map((letterObj) => {
                                const isWrong = wrongClickedId === letterObj.id;
                                
                                return (
                                    <div key={letterObj.id} className="flex justify-center items-center h-[70px] w-[70px] sm:h-[90px] sm:w-[90px] md:h-[110px] md:w-[110px] mx-auto">
                                        <button
                                            onClick={() => handleLetterClick(letterObj)}
                                            style={{
                                                transform: `rotate(${letterObj.rot}deg) translate(${letterObj.tx}px, ${letterObj.ty}px)`
                                            }}
                                            className={`
                                                w-full h-full flex items-center justify-center font-sgk font-medium bg-transparent transition-all duration-300
                                                ${isWrong ? 'animate-shake text-slate-300' : 'hover:scale-110 active:scale-90'}
                                                ${letterObj.isFound ? 'circled bg-red-50/50 scale-110 rotate-0 translate-x-0 translate-y-0' : 'text-slate-800'}
                                            `}
                                        >
                                            <span className="text-[50px] sm:text-[65px] md:text-[85px] leading-none pointer-events-none">
                                                {letterObj.char}
                                            </span>
                                        </button>
                                    </div>
                                );
                            })}
                        </div>
                    </div>

                    {/* Hiệu ứng pháo hoa khi qua bài */}
                    {foundCount >= totalTargets && totalTargets > 0 && (
                        <div className="absolute inset-0 pointer-events-none flex items-center justify-center z-50">
                             <div className="text-7xl animate-bounce">🎉 ⭐ 🎉</div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
