<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bé Vui Học - Săn Chữ</title>

    <!-- Import React, ReactDOM, và Babel -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Import Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body {
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #cffafe 0%, #eff6ff 50%, #dcfce3 100%);
        }

        @keyframes shake {
            10%, 90% { transform: translate3d(-2px, 0, 0); }
            20%, 80% { transform: translate3d(4px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-8px, 0, 0); }
            40%, 60% { transform: translate3d(8px, 0, 0); }
        }
        
        @keyframes spin-slow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        @keyframes float-delay {
            0%, 100% { transform: translateY(0) rotate(5deg); }
            50% { transform: translateY(-12px) rotate(-5deg); }
        }

        @keyframes popCircle {
            0% { transform: scale(0.5); opacity: 0; }
            50% { transform: scale(1.15); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }
        
        .animate-spin-slow { animation: spin-slow 8s linear infinite; }
        .animate-shake { animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both; }
        .animate-float { animation: float 3s ease-in-out infinite; }
        .animate-float-delay { animation: float-delay 4s ease-in-out infinite; }

        /* Hiệu ứng vẽ vòng tròn khoanh đỏ mộc mạc như vẽ tay */
        .circled {
            position: relative;
            color: #ef4444 !important;
            transition: all 0.3s;
        }
        
        .circled::after {
            content: '';
            position: absolute;
            top: -5px; left: -5px; right: -5px; bottom: -5px;
            border: 5px solid #ef4444;
            /* Tạo hình dạng méo nhẹ để giống nét bút khoanh tay */
            border-radius: 50% 40% 60% 50% / 50% 50% 40% 60%;
            animation: popCircle 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useRef } = React;

        // ==========================================
        // CÁC COMPONENT ICON
        // ==========================================
        const IconPlay = ({ size=24, className="", fill="none" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
        );
        const IconVolume2 = ({ size=24, className="" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path><path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path></svg>
        );
        const IconStar = ({ size=24, className="", fill="none" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>
        );
        const IconRefresh = ({ size=24, className="" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="1 4 1 10 7 10"></polyline><polyline points="23 20 23 14 17 14"></polyline><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"></path></svg>
        );
        const IconHome = ({ size=24, className="" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
        );
        const IconArrowLeft = ({ size=24, className="" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        );

        // ==========================================
        // DỮ LIỆU BẢNG CHỮ CÁI
        // ==========================================
        const ALPHABET = [
            { lower: 'a', upper: 'A', name: 'chữ a' }, { lower: 'ă', upper: 'Ă', name: 'chữ á' }, { lower: 'â', upper: 'Â', name: 'chữ ớ' },
            { lower: 'b', upper: 'B', name: 'chữ bờ' }, { lower: 'c', upper: 'C', name: 'chữ cờ' }, { lower: 'd', upper: 'D', name: 'chữ dờ' },
            { lower: 'đ', upper: 'Đ', name: 'chữ đờ' }, { lower: 'e', upper: 'E', name: 'chữ e' }, { lower: 'ê', upper: 'Ê', name: 'chữ ê' },
            { lower: 'g', upper: 'G', name: 'chữ gờ' }, { lower: 'h', upper: 'H', name: 'chữ hờ' }, { lower: 'i', upper: 'I', name: 'chữ i ngắn' },
            { lower: 'k', upper: 'K', name: 'chữ ca' }, { lower: 'l', upper: 'L', name: 'chữ lờ' }, { lower: 'm', upper: 'M', name: 'chữ mờ' },
            { lower: 'n', upper: 'N', name: 'chữ nờ' }, { lower: 'o', upper: 'O', name: 'chữ o' }, { lower: 'ô', upper: 'Ô', name: 'chữ ô' },
            { lower: 'ơ', upper: 'Ơ', name: 'chữ ơ' }, { lower: 'p', upper: 'P', name: 'chữ pờ' }, { lower: 'q', upper: 'Q', name: 'chữ cu' },
            { lower: 'r', upper: 'R', name: 'chữ rờ' }, { lower: 's', upper: 'S', name: 'chữ sờ' }, { lower: 't', upper: 'T', name: 'chữ tờ' },
            { lower: 'u', upper: 'U', name: 'chữ u' }, { lower: 'ư', upper: 'Ư', name: 'chữ ư' }, { lower: 'v', upper: 'V', name: 'chữ vờ' },
            { lower: 'x', upper: 'X', name: 'chữ xờ' }, { lower: 'y', upper: 'Y', name: 'chữ y dài' }
        ];

        // ==========================================
        // COMPONENT CHÍNH
        // ==========================================
        const App = () => {
            const [gameState, setGameState] = useState('START'); // START, PLAYING, END
            const [targetLetter, setTargetLetter] = useState(null);
            const [boardLetters, setBoardLetters] = useState([]);
            const [foundCount, setFoundCount] = useState(0);
            const [totalTargets, setTotalTargets] = useState(0);
            const [wrongClickedId, setWrongClickedId] = useState(null);
            const [starCount, setStarCount] = useState(0);

            const activeTimeoutsRef = useRef([]);
            const recentTargetsRef = useRef([]); // Chống lặp đề bài

            useEffect(() => {
                return () => {
                    activeTimeoutsRef.current.forEach(clearTimeout);
                    window.speechSynthesis.cancel();
                };
            }, []);

            const setSafeTimeout = (callback, delay) => {
                const timer = setTimeout(callback, delay);
                activeTimeoutsRef.current.push(timer);
                return timer;
            };

            const speak = useCallback((text, rate = 0.9, onEndCallback = null) => {
                if ('speechSynthesis' in window) {
                    window.speechSynthesis.cancel();
                    const utterance = new SpeechSynthesisUtterance(text);
                    const voices = window.speechSynthesis.getVoices();
                    
                    const bestVoice = voices.find(v => (v.lang.includes('vi') || v.lang.includes('VN')) && (v.name.includes('Neural') || v.name.includes('HoaiMy')))
                                   || voices.find(v => (v.lang.includes('vi') || v.lang.includes('VN')) && v.name.includes('Google'))
                                   || voices.find(v => v.lang.includes('vi') || v.lang.includes('VN'));
                                   
                    if (bestVoice) utterance.voice = bestVoice;
                    
                    utterance.lang = 'vi-VN';
                    utterance.rate = rate; // Đọc nhanh hơn một chút để bé không đợi lâu
                    utterance.pitch = 1.1; 

                    if (onEndCallback) {
                        let isEnded = false;
                        const handleEnd = () => {
                            if (!isEnded) {
                                isEnded = true;
                                onEndCallback();
                            }
                        };
                        utterance.onend = handleEnd;
                        utterance.onerror = handleEnd;
                        setSafeTimeout(handleEnd, text.length * 120 + 1000); 
                    }
                    window.speechSynthesis.speak(utterance);
                } else {
                    if (onEndCallback) setSafeTimeout(onEndCallback, 1500);
                }
            }, []);

            const generateBoard = useCallback(() => {
                let availableTargets = ALPHABET.filter(item => !recentTargetsRef.current.includes(item.lower));
                if (availableTargets.length === 0) {
                    recentTargetsRef.current = [];
                    availableTargets = ALPHABET;
                }
                const target = availableTargets[Math.floor(Math.random() * availableTargets.length)];
                recentTargetsRef.current.push(target.lower);
                if (recentTargetsRef.current.length > 5) recentTargetsRef.current.shift();

                setTargetLetter(target);

                const BOARD_SIZE = 20; 
                const TARGET_AMOUNT = 6; 
                setTotalTargets(TARGET_AMOUNT);
                setFoundCount(0);

                let newBoard = [];
                
                for (let i = 0; i < TARGET_AMOUNT; i++) {
                    newBoard.push({
                        id: `target_${i}`,
                        char: i % 2 === 0 ? target.upper : target.lower,
                        isTarget: true,
                        isFound: false,
                        rot: Math.floor(Math.random() * 30) - 15, // Giảm độ nghiêng xuống một chút cho dễ nhìn
                        tx: Math.floor(Math.random() * 14) - 7,
                        ty: Math.floor(Math.random() * 14) - 7
                    });
                }

                const distractors = ALPHABET.filter(item => item.lower !== target.lower);
                
                for (let i = 0; i < (BOARD_SIZE - TARGET_AMOUNT); i++) {
                    const randomDistractor = distractors[Math.floor(Math.random() * distractors.length)];
                    newBoard.push({
                        id: `distractor_${i}`,
                        char: Math.random() > 0.5 ? randomDistractor.upper : randomDistractor.lower,
                        isTarget: false,
                        isFound: false,
                        rot: Math.floor(Math.random() * 30) - 15,
                        tx: Math.floor(Math.random() * 14) - 7,
                        ty: Math.floor(Math.random() * 14) - 7
                    });
                }

                newBoard.sort(() => Math.random() - 0.5);
                setBoardLetters(newBoard);

                // Lời đọc siêu ngắn
                setSafeTimeout(() => {
                    speak(`Bé tìm ${target.name} nhé!`);
                }, 300);

            }, [speak]);

            const handleStartApp = () => {
                const applause = document.getElementById('applauseSound');
                if (applause) {
                    applause.play().then(() => {
                        applause.pause();
                        applause.currentTime = 0;
                    }).catch(e => console.log("Lỗi mồi audio:", e));
                }
                setStarCount(0);
                speak(`Cùng chơi Săn chữ nhé!`, 0.9, () => {
                    setGameState('PLAYING');
                    generateBoard();
                });
            };

            const handleLetterClick = (letterObj) => {
                if (letterObj.isFound) return; 

                if (letterObj.isTarget) {
                    setBoardLetters(prev => prev.map(l => l.id === letterObj.id ? { ...l, isFound: true } : l));
                    
                    const newFoundCount = foundCount + 1;
                    setFoundCount(newFoundCount);

                    const ping = document.getElementById('pingSound');
                    if (ping) {
                        ping.currentTime = 0;
                        ping.play().catch(e=>console.log(e));
                    }

                    if (newFoundCount >= totalTargets) {
                        const applause = document.getElementById('applauseSound');
                        if (applause) {
                            applause.currentTime = 0;
                            applause.play().catch(e => console.log(e));
                        }

                        setStarCount(s => s + 1);
                        speak(`Hoan hô!`, 0.9, () => {
                            setSafeTimeout(() => {
                                if (starCount + 1 >= 5) {
                                    setGameState('END');
                                    speak("Con giỏi quá! Tặng con 5 sao!");
                                } else {
                                    generateBoard();
                                }
                            }, 800);
                        });
                    }

                } else {
                    setWrongClickedId(letterObj.id);
                    speak(`Chưa đúng rồi.`);
                    setSafeTimeout(() => setWrongClickedId(null), 800);
                }
            };

            const repeatQuestion = () => {
                speak(`Bé tìm ${targetLetter.name} nhé!`);
            };

            // ========================================
            // GIAO DIỆN START
            // ========================================
            if (gameState === 'START') {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center p-4 font-sans relative">
                        <audio id="applauseSound" src="https://cdn.pixabay.com/audio/2022/03/15/audio_1067517c5b.mp3" preload="auto"></audio>
                        <audio id="pingSound" src="https://cdn.pixabay.com/audio/2021/08/04/audio_0625c1539c.mp3" preload="auto"></audio>

                        <button onClick={() => window.location.href='index.html'} className="absolute top-6 left-6 flex items-center gap-2 bg-white/80 backdrop-blur text-indigo-600 hover:bg-white px-4 py-2 rounded-xl shadow-md font-bold transition-transform active:scale-90 z-20">
                            <IconArrowLeft size={24} /> Về Menu
                        </button>
                        
                        <div className="bg-white/90 backdrop-blur-md p-8 rounded-[2.5rem] shadow-2xl text-center max-w-md w-full border-4 border-white transform transition hover:scale-105 z-10 relative overflow-hidden">
                            {/* Nền hoạt hình mờ cho banner */}
                            <div className="absolute -top-10 -right-10 text-9xl opacity-20 pointer-events-none transform rotate-12">🐝</div>
                            <div className="absolute -bottom-10 -left-10 text-9xl opacity-20 pointer-events-none transform -rotate-12">🐻</div>
                            
                            <div className="text-7xl mb-4 relative animate-float">
                                🐝<span className="absolute -top-2 -right-4 text-4xl">🔍</span>
                            </div>
                            <h1 className="text-5xl font-bold mb-4 font-sans text-blue-600 tracking-wide drop-shadow-sm">
                                SĂN CHỮ
                            </h1>
                            <p className="text-lg text-slate-500 mb-8 italic">Bé tinh mắt tìm chữ cái nha</p>
                            <button 
                                onClick={handleStartApp}
                                className="w-full bg-gradient-to-r from-blue-500 to-sky-400 hover:from-blue-600 hover:to-sky-500 text-white text-3xl font-bold py-6 px-8 rounded-2xl shadow-xl flex items-center justify-center gap-4 transition-transform active:scale-95 border-2 border-blue-300"
                            >
                                <IconPlay size={40} fill="currentColor" /> Bắt đầu ngay
                            </button>
                        </div>
                    </div>
                );
            }

            // ========================================
            // GIAO DIỆN END
            // ========================================
            if (gameState === 'END') {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center p-4 font-sans">
                        <div className="bg-white/95 backdrop-blur p-8 rounded-[2.5rem] shadow-2xl text-center max-w-md w-full border-4 border-white">
                            <div className="text-7xl mb-4 animate-bounce">🏆</div>
                            <h1 className="text-4xl font-bold text-yellow-500 mb-4 drop-shadow-md">Con Giỏi Quá!</h1>
                            <div className="flex justify-center gap-2 mb-8 bg-yellow-50 py-4 rounded-3xl border border-yellow-200">
                                {[1, 2, 3, 4, 5].map(i => (
                                    <IconStar key={i} size={48} className="text-yellow-400 animate-spin-slow drop-shadow" fill="currentColor" />
                                ))}
                            </div>
                            <p className="text-2xl text-gray-700 mb-8 font-medium">Bé đã săn được rất nhiều chữ!</p>
                            <div className="flex flex-col gap-4">
                                <button onClick={handleStartApp} className="w-full bg-gradient-to-r from-green-400 to-emerald-500 hover:from-green-500 hover:to-emerald-600 text-white text-2xl font-bold py-4 rounded-2xl shadow-lg flex items-center justify-center gap-2 active:scale-95 border-2 border-green-300">
                                    <IconRefresh size={28} /> Chơi lại bài này
                                </button>
                                <button onClick={() => window.location.href='index.html'} className="w-full bg-white hover:bg-gray-50 text-slate-700 text-2xl font-bold py-4 rounded-2xl shadow flex items-center justify-center gap-2 active:scale-95 border-2 border-slate-200">
                                    <IconHome size={28} /> Về màn hình chính
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            // ========================================
            // GIAO DIỆN PLAYING
            // ========================================
            return (
                <div className="min-h-screen flex flex-col items-center justify-between p-4 md:p-6 font-sans relative overflow-hidden">
                    
                    {/* HÌNH TRANG TRÍ CHỐNG ĐÈ: Dính chặt vào các góc màn hình, nằm bên dưới (z-0) */}
                    <div className="absolute top-16 left-2 lg:left-12 text-7xl lg:text-[120px] animate-float opacity-80 pointer-events-none z-0">🐝</div>
                    <div className="absolute top-4 right-4 lg:right-16 text-6xl lg:text-8xl animate-float-delay opacity-60 pointer-events-none z-0">☁️</div>
                    <div className="absolute bottom-4 right-4 lg:right-12 text-8xl lg:text-[150px] animate-float-delay opacity-90 pointer-events-none z-0 transform -scale-x-100">🐻</div>
                    <div className="absolute bottom-6 left-6 lg:left-16 text-7xl lg:text-9xl animate-float opacity-80 pointer-events-none z-0">🌻</div>

                    {/* Header Controls */}
                    <div className="w-full max-w-4xl flex justify-between items-center bg-white/80 backdrop-blur-sm p-4 rounded-3xl shadow-sm border border-white/50 z-20">
                        <button onClick={() => window.location.href='index.html'} className="text-slate-500 hover:text-red-500 bg-white shadow-sm p-2 rounded-full active:scale-90 transition border border-slate-100">
                            <IconArrowLeft size={28} />
                        </button>
                        
                        <div className="flex gap-1 flex-1 justify-center bg-slate-50/50 py-1 px-4 rounded-full w-fit mx-auto">
                            {[...Array(5)].map((_, i) => {
                                const activeStars = starCount === 0 ? 0 : ((starCount - 1) % 5) + 1;
                                return <IconStar key={i} size={32} className={i < activeStars ? "text-yellow-400 transform scale-110 drop-shadow-sm" : "text-slate-300"} fill={i < activeStars ? "currentColor" : "none"} />
                            })}
                        </div>
                        
                        <button onClick={repeatQuestion} className="bg-sky-100 hover:bg-sky-200 text-sky-600 p-3 rounded-full active:scale-90 transition shadow-sm border border-sky-200">
                            <IconVolume2 size={32} />
                        </button>
                    </div>

                    {/* Khung chứa trò chơi chính: Đổ nền kính mờ để tách biệt hoàn toàn với hình trang trí ở dưới */}
                    <div className="flex-1 w-full max-w-4xl flex flex-col items-center justify-center my-6 z-10 relative">
                        <div className="w-full bg-white/60 backdrop-blur-xl rounded-[2.5rem] shadow-xl border-4 border-white p-6 md:p-8 flex flex-col items-center">
                            
                            {/* Đề bài */}
                            <div className="w-full flex justify-between items-center px-2 mb-6 border-b-2 border-slate-200/50 pb-4">
                                <div className="flex flex-col">
                                    <h2 className="text-3xl md:text-5xl font-bold text-sky-600 tracking-wide uppercase drop-shadow-sm">SĂN CHỮ</h2>
                                    <p className="text-base md:text-xl text-slate-600 font-medium">Bé tìm và khoanh tròn nhé</p>
                                </div>
                                
                                {targetLetter && (
                                    <div className="flex gap-3 md:gap-4 items-baseline bg-white px-5 py-2 md:px-8 md:py-3 rounded-2xl shadow-md border-4 border-yellow-300 text-amber-500 transform rotate-2">
                                        <span className="text-5xl md:text-7xl font-bold">{targetLetter.upper}</span>
                                        <span className="text-4xl md:text-6xl font-bold">{targetLetter.lower}</span>
                                    </div>
                                )}
                            </div>

                            {/* Lưới chữ cái */}
                            <div className="grid grid-cols-4 sm:grid-cols-5 gap-3 sm:gap-6 md:gap-8 w-full">
                                {boardLetters.map((letterObj) => {
                                    const isWrong = wrongClickedId === letterObj.id;
                                    
                                    return (
                                        <div key={letterObj.id} className="flex justify-center items-center h-[65px] w-[65px] sm:h-[85px] sm:w-[85px] md:h-[100px] md:w-[100px] mx-auto">
                                            <button
                                                onClick={() => handleLetterClick(letterObj)}
                                                style={{
                                                    transform: `rotate(${letterObj.rot}deg) translate(${letterObj.tx}px, ${letterObj.ty}px)`
                                                }}
                                                className={`
                                                    w-full h-full flex items-center justify-center font-sans font-bold bg-transparent transition-all duration-300
                                                    ${isWrong ? 'animate-shake text-slate-300/50' : 'hover:scale-110 active:scale-90'}
                                                    ${letterObj.isFound ? 'circled bg-red-50/80 scale-110 rotate-0 translate-x-0 translate-y-0' : 'text-slate-700 drop-shadow-sm'}
                                                `}
                                            >
                                                <span className="text-[45px] sm:text-[60px] md:text-[75px] leading-none pointer-events-none">
                                                    {letterObj.char}
                                                </span>
                                            </button>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    </div>

                    {/* Hiệu ứng pháo hoa khi qua bài */}
                    {foundCount >= totalTargets && totalTargets > 0 && (
                        <div className="absolute inset-0 pointer-events-none flex items-center justify-center z-50 bg-white/20 backdrop-blur-sm">
                             <div className="text-[100px] animate-bounce drop-shadow-2xl">🎉⭐🎉</div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
